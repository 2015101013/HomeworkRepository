<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Atlas - Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="page-wrapper">
        <div class="card login-card">
            <div class="hero">
                <p class="eyebrow">WELCOME BACK</p>
                <h1>Login</h1>
                <p class="subtitle">Sign in and continue your journey through cinema.</p>
            </div>

            <form action="#" method="post">
                <div class="field">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="login-username" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="login-password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Login</button>
                    <button type="reset" class="secondary-btn">Cancel</button>
                </div>
            </form>

            <p class="bottom-link">Need an account? <a href="signup.html">Go back to Sign Up</a></p>
        </div>
    </div>
</body>
</html>
