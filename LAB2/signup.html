<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Atlas - Sign Up</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="page-wrapper">
        <div class="card">
            <div class="hero">
                <p class="eyebrow">MOVIE SEARCH WEBSITE</p>
                <h1>Cinema Atlas</h1>
                <p class="subtitle">Join the website and start searching for your favorite films.</p>
            </div>

            <form action="login.html" method="get">
                <div class="form-grid">
                    <div class="field">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" autofocus placeholder="Enter your full name" required autocomplete="name">
                    </div>

                    <div class="field">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>

                    <div class="field">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="birthday">Birthday</label>
                        <input type="date" id="birthday" name="birthday" required>
                    </div>

                    <div class="field">
                        <label for="watchtime">Weekly Movie Time (hours)</label>
                        <input type="number" id="watchtime" name="watchtime" min="0" max="50" step="0.5" placeholder="Example: 4.5" required>
                    </div>

                    <div class="field">
                        <label for="genre">Favorite Genre</label>
                        <select id="genre" name="genre" required>
                            <option value="">Select your genre</option>
                            <option>Science Fiction</option>
                            <option>Action</option>
                            <option>Drama</option>
                            <option>Thriller</option>
                            <option>Fantasy</option>
                            <option>Animation</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="moviekeyword">Favorite Movie Keyword</label>
                        <input type="search" id="moviekeyword" name="moviekeyword" placeholder="Type a movie title" required>
                    </div>
                </div>

                <div class="field full-width">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Go to Login Page</button>
                    <a class="secondary-btn" href="login.html">Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
