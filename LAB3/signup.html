<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Atlas - Sign Up</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="site-shell">
        <nav class="main-nav">
            <a href="index.html" class="nav-item">Home</a>
            <a href="signup.html" class="nav-item">Sign Up</a>
            <a href="login.html" class="nav-item">Login</a>
        </nav>

        <section class="form-card">
            <p class="eyebrow">CREATE ACCOUNT</p>
            <h1>Sign Up</h1>
            <p class="form-subtitle">Join Cinema Atlas and prepare your personal movie search experience.</p>

            <form action="login.html" method="get">
                <div class="form-grid">
                    <div class="field">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" autofocus placeholder="Enter your full name" required autocomplete="name">
                    </div>

                    <div class="field">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="birthday">Birthday</label>
                        <input type="date" id="birthday" name="birthday" required>
                    </div>

                    <div class="field">
                        <label for="watchtime">Weekly Movie Time</label>
                        <input type="number" id="watchtime" name="watchtime" min="0" max="50" step="0.5" placeholder="Hours per week" required>
                    </div>

                    <div class="field">
                        <label for="genre">Favorite Genre</label>
                        <select id="genre" name="genre" required>
                            <option value="">Select one genre</option>
                            <option>Science Fiction</option>
                            <option>Action</option>
                            <option>Drama</option>
                            <option>Thriller</option>
                            <option>Fantasy</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="keyword">Favorite Movie Keyword</label>
                        <input type="search" id="keyword" name="keyword" placeholder="Example: Interstellar" required>
                    </div>
                </div>

                <div class="field full-field">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Go to Login Page</button>
                    <a href="login.html" class="secondary-btn">Login</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
